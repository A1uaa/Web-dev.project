<!-- src/app/features/tours/tour-form/tour-form.component.html -->
<div class="form-container">
  <div class="form-card">
    <h2>{{ isEdit ? 'Edit Tour' : 'Create New Tour' }}</h2>
    <p>Fill in the details to {{ isEdit ? 'update your' : 'create a new' }} mountain adventure</p>

    <form [formGroup]="tourForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Tour Title *</label>
        <input type="text" formControlName="title" placeholder="e.g., Kolsai Lakes Trek">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" formControlName="location" placeholder="e.g., Kazakhstan">
        </div>
        <div class="form-group">
          <label>Price (USD) *</label>
          <input type="number" formControlName="price" placeholder="250">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Duration (Days) *</label>
          <input type="number" formControlName="duration" placeholder="3">
        </div>
        <div class="form-group">
          <label>Difficulty *</label>
          <select formControlName="difficulty">
            <option *ngFor="let d of difficulties" [value]="d">{{ d }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" rows="5" placeholder="Describe the tour, what makes it special..."></textarea>
      </div>

      <div class="form-group">
        <label>Tour Dates *</label>
        <input type="text" formControlName="dates" placeholder="June 20 – June 22, July 5 – July 7">
        <small>Separate multiple dates with commas</small>
      </div>

      <div class="form-group">
        <label>Highlights</label>
        <input type="text" formControlName="highlights" placeholder="Camping by the lake, Local guide, Traditional meals">
        <small>Separate highlights with commas</small>
      </div>

      <div class="form-group">
        <label>Maximum Bookings *</label>
        <input type="number" formControlName="maxBookings" placeholder="15">
      </div>

      <!-- Загрузка фото -->
      <div class="form-group">
        <label>Tour Photo *</label>
        <div class="upload-area" (click)="fileInput.click()">
          <input type="file" #fileInput (change)="onImageSelected($event)" accept="image/*" style="display: none">
          <div *ngIf="!imagePreview" class="upload-placeholder">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Click to upload tour photo</p>
            <small>Recommended size: 800x500px</small>
          </div>
          <img *ngIf="imagePreview" [src]="imagePreview" class="image-preview">
          <button *ngIf="imagePreview" type="button" class="remove-image" (click)="removeImage(); $event.stopPropagation()">
            <i class="fas fa-times"></i> Remove
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="router.navigate(['/dashboard'])">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="tourForm.invalid || !imagePreview">
          {{ isEdit ? 'Update Tour' : 'Create Tour' }}
        </button>
      </div>
    </form>
  </div>
</div>
