<!-- src/app/features/auth/register/register.component.html -->
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join our mountain community today</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="user@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="...">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="...">
      </div>

      <!-- Выбор роли -->
      <div class="form-group">
        <label>Register as</label>
        <div class="role-options">
          <label class="role-option" [class.selected]="selectedRole === 'user'">
            <input type="radio" name="role" value="user" [(ngModel)]="selectedRole">
            <div class="role-icon">
              <i class="fas fa-hiking"></i>
            </div>
            <div class="role-name">Adventurer</div>
            <div class="role-desc">Browse tours, join adventures, share experiences</div>
          </label>
          
          <label class="role-option" [class.selected]="selectedRole === 'organizer'">
            <input type="radio" name="role" value="organizer" [(ngModel)]="selectedRole">
            <div class="role-icon">
              <i class="fas fa-flag-checkered"></i>
            </div>
            <div class="role-name">Tour Guide / Organizer</div>
            <div class="role-desc">Create tours, manage bookings, lead adventures</div>
          </label>
        </div>
      </div>

      <button type="submit" class="btn-register">Sign Up</button>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
  </div>
</div>
