<!-- src/app/features/posts/post-form/post-form.component.html -->
<div class="form-container">
  <div class="form-card">
    <h2>Share Your Adventure</h2>
    <p>Write about your mountain experience and inspire others</p>

    <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" placeholder="e.g., Summiting Mount Kilimanjaro">
      </div>

      <div class="form-group">
        <label>Your Story *</label>
        <textarea formControlName="content" rows="8" placeholder="Share your experience..."></textarea>
      </div>

      <div class="form-group">
        <label>Upload Photo</label>
        <div class="upload-area" (click)="fileInput.click()">
          <input type="file" #fileInput (change)="onImageSelected($event)" accept="image/*" style="display: none">
          <div *ngIf="!imagePreview" class="upload-placeholder">
            📸 Click to upload an image
          </div>
          <img *ngIf="imagePreview" [src]="imagePreview" class="image-preview">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="router.navigate(['/posts'])">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="postForm.invalid">Publish Post</button>
      </div>
    </form>
  </div>
</div>
